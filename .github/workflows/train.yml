name: Train

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: downloader/target/
          key: rust-${{ hashFiles('downloader/Cargo.lock') }}

      - name: Build downloader
        run: cargo build --release --manifest-path downloader/Cargo.toml

      - name: Determine next month
        id: month
        run: |
          LAST=$(cat ml/LAST_PROCESSED 2>/dev/null || echo "2017-07")
          NEXT=$(date -d "${LAST}-01 + 1 month" +%Y-%m)
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "last=$LAST" >> $GITHUB_OUTPUT

      - name: Download data
        id: download
        run: |
          MONTH=${{ steps.month.outputs.next }}
          DOWNLOADER=./downloader/target/release/downloader
          BASE="https://data.binance.vision/data/spot/monthly/klines/BTCUSDT"

          echo "=== downloading $MONTH ==="
          for iv in 1s 1m 3m 5m 15m 30m 1h 2h 4h 6h 8h 12h 1d 3d 1w 1mo; do
            $DOWNLOADER "${BASE}/${iv}/BTCUSDT-${iv}-${MONTH}.zip" || true
          done

          COUNT=$(ls BTCUSDT-*-${MONTH}.csv 2>/dev/null | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "=== downloaded $COUNT intervals for $MONTH ==="

      - if: steps.download.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - if: steps.download.outputs.count != '0'
        name: Install dependencies
        run: pip install -r ml/requirements.txt

      - if: steps.download.outputs.count != '0'
        name: Train
        run: python ml/train.py

      - if: steps.download.outputs.count != '0'
        name: Upload model to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MONTH=${{ steps.month.outputs.next }}
          echo "=== uploading model.bin to release 'latest' ==="
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest \
            model.bin \
            --title "Latest Model (${MONTH})" \
            --notes "Trained on ${MONTH} kline data (all intervals)"

      - if: steps.download.outputs.count != '0'
        name: Commit state
        run: |
          MONTH=${{ steps.month.outputs.next }}
          echo "$MONTH" > ml/LAST_PROCESSED
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ml/LAST_PROCESSED
          git diff --cached --quiet || git commit -m "train: ${MONTH}"
          git push

      - if: steps.download.outputs.count == '0'
        name: Done
        run: echo "No data for ${{ steps.month.outputs.next }} — caught up to present"
